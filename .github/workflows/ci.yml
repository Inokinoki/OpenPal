name: CI - Format, Lint & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 代码格式化检查
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Check formatting
        run: |
          echo "Checking Go code formatting..."
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi
          echo "✅ All files are properly formatted"

  # 代码静态分析
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

      - name: Run linter
        run: |
          echo "Running golangci-lint..."
          golangci-lint run ./...
        continue-on-error: true

  # 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          go test -v -race -coverprofile=coverage.out ./...
        
      - name: Show coverage
        run: |
          echo "Test Coverage Report:"
          go tool cover -func=coverage.out
          
      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Fail if coverage too low
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 20" | bc -l) )); then
            echo "❌ Coverage is below 20%"
            exit 1
          fi
          echo "✅ Coverage is acceptable"

  # 集成测试框架检查
  integration-check:
    name: Integration Test Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Check integration tests compile
        run: |
          echo "Checking integration tests compile..."
          go test -tags=integration -c ./tests/integration/...
          echo "✅ Integration tests compile successfully"

  # 总结
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [format, lint, test, integration-check]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ needs.format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Check | ${{ needs.integration-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.format.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All critical checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some checks failed or were skipped" >> $GITHUB_STEP_SUMMARY
          fi
