name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  # Unit tests (no API keys needed)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          go test -v ./internal/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            coverage.out
            test-results.txt
          retention-days: 7

  # Integration tests with all API keys
  integration-tests:
    name: Integration Tests (All Providers)
    runs-on: ubuntu-latest
    # Only run if secrets are available
    if: ${{ secrets.ANTHROPIC_API_KEY != '' || secrets.GEMINI_API_KEY != '' || secrets.GITHUB_TOKEN != '' }}
    env:
      # API Keys from GitHub Secrets
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_COPILOT_TOKEN: ${{ secrets.GITHUB_COPILOT_TOKEN }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}

      # Test configuration
      PAL_PROVIDER: claude
      PAL_WORK_DIR: /tmp/workspace
      PAL_SESSION_DIR: /tmp/pal-broker-sessions
      CGO_ENABLED: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create workspace directory
        run: mkdir -p $PAL_WORK_DIR $PAL_SESSION_DIR

      - name: Test with Claude
        if: ${{ env.ANTHROPIC_API_KEY != '' || env.CLAUDE_API_KEY != '' }}
        run: |
          echo "Testing Claude Code integration..."
          go test -tags=integration -run TestClaude -v ./tests/integration/...
          go test -tags=integration -run TestClaude_ToolCalling -v ./tests/integration/...
          go test -tags=integration -run TestClaude_3TurnConversation -v ./tests/integration/...
          go test -tags=integration -run TestClaude_SessionRecovery -v ./tests/integration/...

      - name: Test with Codex
        if: ${{ env.CODEX_API_KEY != '' }}
        run: |
          echo "Testing Codex integration..."
          go test -tags=integration -run TestCodex -v ./tests/integration/...
          go test -tags=integration -run TestCodex_ToolCalling -v ./tests/integration/...
          go test -tags=integration -run TestCodex_3TurnConversation -v ./tests/integration/...
          go test -tags=integration -run TestCodex_SessionRecovery -v ./tests/integration/...

      - name: Test with Gemini
        if: ${{ env.GEMINI_API_KEY != '' || env.GOOGLE_API_KEY != '' }}
        run: |
          echo "Testing Gemini integration..."
          go test -tags=integration -run TestGemini -v ./tests/integration/...
          go test -tags=integration -run TestGemini_ToolCalling -v ./tests/integration/...
          go test -tags=integration -run TestGemini_3TurnConversation -v ./tests/integration/...
          go test -tags=integration -run TestGemini_SessionRecovery -v ./tests/integration/...

      - name: Test with Copilot
        if: ${{ env.GITHUB_TOKEN != '' || env.GITHUB_COPILOT_TOKEN != '' }}
        run: |
          echo "Testing Copilot integration..."
          go test -tags=integration -run TestCopilot -v ./tests/integration/...
          go test -tags=integration -run TestCopilot_ToolCalling -v ./tests/integration/...
          go test -tags=integration -run TestCopilot_ACP_3TurnConversation -v ./tests/integration/...

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            *.log
          retention-days: 7

  # Docker integration tests
  docker-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_COPILOT_TOKEN: ${{ secrets.GITHUB_COPILOT_TOKEN }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t pal-broker:test .

      - name: Run Docker integration tests
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY \
            -e CLAUDE_API_KEY=$CLAUDE_API_KEY \
            -e GEMINI_API_KEY=$GEMINI_API_KEY \
            -e GOOGLE_API_KEY=$GOOGLE_API_KEY \
            -e GITHUB_TOKEN=$GITHUB_TOKEN \
            -e GITHUB_COPILOT_TOKEN=$GITHUB_COPILOT_TOKEN \
            -e CODEX_API_KEY=$CODEX_API_KEY \
            pal-broker:test

      - name: Upload Docker test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-results
          path: |
            test-results/
            docker-test.log
          retention-days: 7

  # Test summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, docker-tests]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Tests | ${{ needs.docker-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "✅ Unit tests passed!" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ Integration tests passed!" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.integration-tests.result }}" == "skipped" ]; then
            echo "⏸️ Integration tests skipped (no API keys configured)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.docker-tests.result }}" == "success" ]; then
            echo "✅ Docker tests passed!" >> $GITHUB_STEP_SUMMARY
          fi
